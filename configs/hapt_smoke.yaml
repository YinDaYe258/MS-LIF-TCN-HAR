seed: 42
device: auto
dataset:
  name: hapt12
  task: hapt12
  root: data/HAPT Dataset
  context_len: 2
  window_size: 128
  stride: 64
  val_subject_fraction: 0.2
  sequence_within_segment: false
  smoke_max_train_sequences: 48
  smoke_max_val_sequences: 24
  smoke_max_test_sequences: 24
model:
  hidden_dim: 32
  branch_dim: 16
  beta: 0.9
  alpha: 0.8
  theta_init: 1.0
  theta_scale: 0.1
  num_groups: 4
  dropout: 0.1
  threshold_modulation: true
  context_memory: true
training:
  target_mode: last
  epochs: 1
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  patience: 3
  spike_reg_lambda: 0.0001
  num_workers: 0
results:
  dir: results
