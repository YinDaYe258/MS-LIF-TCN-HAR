seed: 42
device: auto
dataset:
  name: ucihar
  root: data/UCI HAR Dataset
  context_len: 8
  val_subject_fraction: 0.2
  smoke_max_train_sequences: 256
  smoke_max_val_sequences: 128
  smoke_max_test_sequences: 128
model:
  hidden_dim: 128
  branch_dim: 32
  tcn_kernel_size: 3
  tcn_layers: 2
  tcn_dropout: 0.2
  attention_hidden_dim: 64
  beta: 0.9
  theta_init: 1.0
  dropout: 0.2
training:
  target_mode: last
  epochs: 40
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  patience: 10
  spike_reg_lambda: 0.0001
  loss_type: ce
  focal_gamma: 2.0
  class_weight_source: train_labels
  aux_loss:
    supervised_contrastive:
      enabled: false
      weight: 0.05
      temperature: 0.2
    center_loss:
      enabled: false
      weight: 0.001
  augmentation:
    enabled: false
    jitter_std: 0.03
    scaling_std: 0.10
    channel_dropout_prob: 0.05
    temporal_shift_max: 4
  num_workers: 0
results:
  dir: results
